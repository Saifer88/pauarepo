<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" fill="none">
  <!-- Figure doing overhead press -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head -->
    <circle cx="40" cy="35" r="6.5" fill="#ffffff"/>
    <!-- Torso -->
    <path d="M 40 41 L 40 65"/>
    <!-- Arms straight up holding bar -->
    <path d="M 40 46 L 30 30 L 25 14"/>
    <path d="M 40 46 L 50 30 L 55 14"/>
    <!-- Legs in squat position -->
    <path d="M 40 65 L 32 78 L 28 92"/>
    <path d="M 40 65 L 48 78 L 52 92"/>
  </g>
  
  <!-- Barbell held overhead -->
  <line x1="12" y1="12" x2="68" y2="12" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Plates left -->
  <rect x="6" y="5" width="7" height="14" rx="2" fill="#d4a574"/>
  <rect x="1" y="7" width="5" height="10" rx="1.5" fill="#d4a574" opacity="0.5"/>
  <!-- Plates right -->
  <rect x="67" y="5" width="7" height="14" rx="2" fill="#d4a574"/>
  <rect x="74" y="7" width="5" height="10" rx="1.5" fill="#d4a574" opacity="0.5"/>

  <!-- Name -->
  <text x="100" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="1.5">PAOLA MINCUZZI</text>
  <line x1="100" y1="50" x2="340" y2="50" stroke="#d4a574" stroke-width="1.5"/>
  <text x="100" y="72" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.75)" letter-spacing="4">PERSONAL TRAINER</text>
</svg>
